<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Cache Clear</title></head>
<body style="background:#1a1a2e;color:#fff;font-family:sans-serif;text-align:center;padding:40px;">
<h2>キャッシュクリア中...</h2>
<p id="status"></p>
<script>
(async function() {
  var s = document.getElementById('status');
  try {
    var regs = await navigator.serviceWorker.getRegistrations();
    for (var r of regs) await r.unregister();
    s.textContent = 'SW ' + regs.length + '件解除。キャッシュ削除中...';
    var keys = await caches.keys();
    for (var k of keys) await caches.delete(k);
    s.textContent = 'キャッシュ ' + keys.length + '件削除。リダイレクト...';
  } catch(e) { s.textContent = 'Error: ' + e.message; }
  setTimeout(function() { location.href = './?hps'; }, 500);
})();
</script>
</body></html>
