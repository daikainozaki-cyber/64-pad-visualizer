<!DOCTYPE html>
<html><body>
<h2 id="s">Clearing everything...</h2>
<script>
(async () => {
  var s = document.getElementById('s');
  try {
    var regs = await navigator.serviceWorker.getRegistrations();
    for (var i = 0; i < regs.length; i++) await regs[i].unregister();
    var keys = await caches.keys();
    for (var i = 0; i < keys.length; i++) await caches.delete(keys[i]);
    s.textContent = 'Cleared ' + regs.length + ' SW, ' + keys.length + ' caches. Redirecting...';
    setTimeout(function() {
      window.location.replace('http://localhost:8080/?worklet=1&t=' + Date.now());
    }, 1000);
  } catch(e) {
    s.textContent = 'Error: ' + e.message;
  }
})();
</script>
</body></html>
