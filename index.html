// RENDER (MAIN)
// ========================================
function render() {
  const svg = document.getElementById('pad-grid');
  const totalW = COLS * (PAD_SIZE + PAD_GAP) - PAD_GAP + MARGIN * 2;
  const totalH = ROWS * (PAD_SIZE + PAD_GAP) - PAD_GAP + MARGIN * 2;
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.innerHTML = '';

  let activePCS, activeLabel, rootPC, bassPC = null;
  let charPCS = new Set();       // characteristic notes (scale mode)
  let omittedPCS = new Set();    // omitted notes (chord mode voicing)
  let guide3PCS = new Set();     // guide tone: 3rd (chord mode)
  let guide7PCS = new Set();     // guide tone: 7th (chord mode)
  let tensionPCS = new Set();    // tension notes (compound intervals >= 12)
  let qualityPCS = null;         // base quality PCS for chord degree naming

  if (currentMode === 'scale') {
    const scale = SCALES[currentScaleIdx];
    activePCS = new Set(scale.pcs.map(pc => (pc + currentKey) % 12));
    rootPC = currentKey;
    activeLabel = NOTE_NAMES_SHARP[currentKey] + ' ' + scale.name;
    if (scale.cn && scale.cn.length > 0) {
      charPCS = new Set(scale.cn.map(pc => (pc + currentKey) % 12));
    }
  } else {
    const pcs = getBuilderPCS();
    rootPC = bRoot !== null ? bRoot : 0;
    qualityPCS = bQuality ? bQuality.pcs : null;
    if (pcs) {
      activePCS = new Set(pcs.map(pc => (pc + rootPC) % 12));
      // Track tension notes (compound intervals >= 12)
      pcs.filter(pc => pc >= 12).forEach(pc => tensionPCS.add((pc + rootPC) % 12));
      activeLabel = getBuilderChordName();
      if (bBass !== null) bassPC = bBass;
      // Apply voicing toggles
      const p5 = (rootPC + 7) % 12;
      const p3maj = (rootPC + 4) % 12;
      const p3min = (rootPC + 3) % 12;
      if (voicingOmit5 && activePCS.has(p5)) {
        activePCS.delete(p5); omittedPCS.add(p5);
      }
      if (voicingRootless && activePCS.has(rootPC)) {
        activePCS.delete(rootPC); omittedPCS.add(rootPC);
      }
      if (voicingOmit3) {
        if (activePCS.has(p3maj)) { activePCS.delete(p3maj); omittedPCS.add(p3maj); }
        if (activePCS.has(p3min)) { activePCS.delete(p3min); omittedPCS.add(p3min); }
      }
      // Shell voicing: keep only R, 3rd, 7th
      if (shellVoicing) {
        const shellIntervals = new Set([0]); // always root
        [3,4].forEach(iv => shellIntervals.add(iv));   // 3rd (b3 or 3)
        [10,11].forEach(iv => shellIntervals.add(iv));  // 7th (b7 or △7)
        // Also keep 6th for 6th chords (no 7th)
        if (qualityPCS && qualityPCS.includes(9) && !qualityPCS.includes(10) && !qualityPCS.includes(11)) {
          shellIntervals.add(9);
        }
        for (const pc of [...activePCS]) {
          const iv = ((pc - rootPC) + 12) % 12;
          if (!shellIntervals.has(iv)) {
            activePCS.delete(pc); omittedPCS.add(pc);
          }
        }
      }
      // Guide tones: 3rd and 7th separately
      [3,4].forEach(iv => { const pc = (rootPC + iv) % 12; if (activePCS.has(pc)) guide3PCS.add(pc); });
      [10,11].forEach(iv => { const pc = (rootPC + iv) % 12; if (activePCS.has(pc)) guide7PCS.add(pc); });
      // 6th chords: treat 6th as guide tone (replaces 7th role)
      if (qualityPCS && qualityPCS.includes(9) && !qualityPCS.includes(10) && !qualityPCS.includes(11)) {
        const pc = (rootPC + 9) % 12; if (activePCS.has(pc)) guide7PCS.add(pc);
      }
    } else {
      activePCS = new Set();
      activeLabel = bRoot !== null ? NOTE_NAMES_SHARP[bRoot] + '...' : 'Select root';
    }
  }

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const midi = midiNote(row, col);
      const pc = pitchClass(midi);
      const x = MARGIN + col * (PAD_SIZE + PAD_GAP);
      const y = MARGIN + (ROWS - 1 - row) * (PAD_SIZE + PAD_GAP);
      const interval = ((pc - rootPC) + 12) % 12;
      const isRoot = pc === rootPC && !omittedPCS.has(pc);
      const isBass = bassPC !== null && pc === bassPC;
      const isActive = activePCS.has(pc);
      const isOmitted = omittedPCS.has(pc);
      const isChar = currentMode === 'scale' && charPCS.has(pc) && !isRoot;
      const isGuide3 = currentMode === 'chord' && guide3PCS.has(pc) && !isRoot;
      const isGuide7 = currentMode === 'chord' && guide7PCS.has(pc) && !isRoot;
      const isGuide = isGuide3 || isGuide7;
      const isTension = currentMode === 'chord' && tensionPCS.has(pc) && !isRoot && !isGuide;

      let fill = 'var(--pad-off)', textColor = 'var(--text-muted)';
      if (isOmitted) { fill = 'var(--pad-omitted)'; textColor = '#999'; }
      else if (isRoot) { fill = 'var(--pad-root)'; textColor = '#000'; }
      else if (isBass) { fill = '#ff9800'; textColor = '#000'; }
      else if (isGuide3) { fill = 'var(--pad-guide3)'; textColor = '#fff'; }
      else if (isGuide7) { fill = 'var(--pad-guide7)'; textColor = '#fff'; }
      else if (isChar) { fill = 'var(--pad-char)'; textColor = '#000'; }
      else if (isActive) {
        fill = currentMode === 'scale' ? 'var(--pad-scale)' : 'var(--pad-chord)';
        textColor = '#000';
      }

      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('class', 'pad');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', PAD_SIZE); rect.setAttribute('height', PAD_SIZE);
      rect.setAttribute('rx', 6); rect.setAttribute('fill', fill);
      if (isTension) rect.setAttribute('opacity', '0.5');
      // Hold pad: noteOn on press, noteOff on global release (no mouseleave)
      (function(m, r) {
        r.addEventListener('mousedown', (e) => { e.preventDefault(); _heldMidi = m; noteOn(m); });
        r.addEventListener('touchstart', (e) => { e.preventDefault(); _heldTouchMidi = m; noteOn(m); });
      })(midi, rect);
      if (isOmitted) {
        rect.setAttribute('stroke', 'rgba(255,255,255,0.2)');
        rect.setAttribute('stroke-width', 1); rect.setAttribute('stroke-dasharray', '4 2');
      } else {
        rect.setAttribute('stroke', isActive || isBass || isChar || isGuide ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.05)');
        rect.setAttribute('stroke-width', isActive || isBass || isChar || isGuide ? 1.5 : 0.5);
      }
      svg.appendChild(rect);

      const showDegree = isActive || isRoot || isBass || isOmitted || isChar || isGuide;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('class', 'pad-label');
      text.setAttribute('x', x + PAD_SIZE / 2);
      text.setAttribute('y', showDegree ? y + 15 : y + PAD_SIZE / 2 - 4);
      text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('fill', textColor);
      text.setAttribute('font-size', showDegree ? '10px' : '9px');
      text.setAttribute('font-weight', showDegree ? '600' : '400');
      text.textContent = NOTE_NAMES_SHARP[pc];
      svg.appendChild(text);

      if (showDegree) {
        const degName = currentMode === 'scale'
          ? SCALE_DEGREE_NAMES[interval]
          : chordDegreeName(interval, qualityPCS, activePCS);
        const degText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        degText.setAttribute('class', 'pad-label');
        degText.setAttribute('x', x + PAD_SIZE / 2);
        degText.setAttribute('y', y + 34);
        degText.setAttribute('text-anchor', 'middle'); degText.setAttribute('dominant-baseline', 'middle');
        degText.setAttribute('fill', textColor);
        degText.setAttribute('font-size', '13px'); degText.setAttribute('font-weight', '700');
        if (isOmitted) degText.setAttribute('text-decoration', 'line-through');
        degText.textContent = degName;
        svg.appendChild(degText);
      }

      const octText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      octText.setAttribute('class', 'pad-label');
      octText.setAttribute('x', x + PAD_SIZE / 2);
      octText.setAttribute('y', showDegree ? y + 51 : y + PAD_SIZE / 2 + 12);
      octText.setAttribute('text-anchor', 'middle'); octText.setAttribute('dominant-baseline', 'middle');
      octText.setAttribute('fill', textColor);
      octText.setAttribute('font-size', '8px'); octText.setAttribute('opacity', '0.6');
      octText.textContent = noteName(midi);
      svg.appendChild(octText);
    }
  }

  // Reset computed boxes (will be populated if any chord bounding boxes are drawn)
  const hasChordNotes = currentMode === 'chord' && activePCS instanceof Set && activePCS.size > 0;
  if (!hasChordNotes) {
    lastComputedBoxes = [];
    if (selectedVoicingBoxIdx !== null) selectedVoicingBoxIdx = null;
  }

  // Shell voicing bounding boxes (with +1/+2 extension)
  if (currentMode === 'chord' && shellVoicing && hasChordNotes) {
    const shellIntervals = getShellIntervals(qualityPCS, shellVoicing, shellExtension, getBuilderPCS());
    if (shellIntervals) {
      const shellOffsets = shellIntervals.map(v => v - shellIntervals[0]);
      const maxRS = shellIntervals.length <= 3 ? 4 : 5;
      const maxCS = shellIntervals.length <= 3 ? 5 : 6;
      const shellBoxes = [];
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const midi = midiNote(row, col);
          if (pitchClass(midi) !== rootPC) continue;
          const vp = calcVoicingPositions(row, col, shellOffsets);
          if (!vp) continue;
          const rs = vp.maxRow - vp.minRow + 1, cs = vp.maxCol - vp.minCol + 1;
          if (rs > maxRS || cs > maxCS) continue;
          shellBoxes.push({ midi, vp });
        }
      }
      shellBoxes.sort((a, b) => a.midi - b.midi);
      lastComputedBoxes = shellBoxes.map(sb => ({
        midiNotes: sb.vp.positions.map(p => baseMidi() + p.row * ROW_INTERVAL + p.col).sort((a, b) => a - b)
      }));
      // Mark duplicate MIDI positions for blinking
      const shellMidiCount = new Map();
      shellBoxes.forEach(sb => shellMidiCount.set(sb.midi, (shellMidiCount.get(sb.midi) || 0) + 1));
      const shellDupSet = new Set();
      shellBoxes.forEach((sb, i) => { if (shellMidiCount.get(sb.midi) > 1) shellDupSet.add(i); });
      drawVoicingBoxes(svg, shellBoxes.map(sb => sb.vp), '#ffd740', '#CC79A7', shellDupSet);
    }
  }

  // Inversion / Drop voicing bounding boxes
  if (currentMode === 'chord' && !shellVoicing && (voicingInversion > 0 || voicingDrop) && activePCS.size > 0) {
    const chordPCS = getBuilderPCS();
    if (chordPCS && chordPCS.length >= 3) {
      const inv = Math.min(voicingInversion, chordPCS.length - 1);
      const result = calcVoicingOffsets(chordPCS, inv, voicingDrop);
      const offsets = result.offsets;
      // Bass pitch class from voicing calculation (handles drop correctly)
      const bassAbsPC = ((rootPC + result.bassInterval) % 12 + 12) % 12;
      const voicingBoxes = [];
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const midi = midiNote(row, col);
          const pc = pitchClass(midi);
          if (pc !== bassAbsPC) continue;
          const vp = calcVoicingPositions(row, col, offsets);
          if (!vp) continue;
          voicingBoxes.push({ midi, vp });
        }
      }
      voicingBoxes.sort((a, b) => a.midi - b.midi);
      lastComputedBoxes = voicingBoxes.map(vb => ({
        midiNotes: vb.vp.positions.map(p => baseMidi() + p.row * ROW_INTERVAL + p.col).sort((a, b) => a - b)
      }));
      const voicMidiCount = new Map();
      voicingBoxes.forEach(vb => voicMidiCount.set(vb.midi, (voicMidiCount.get(vb.midi) || 0) + 1));
      const voicDupSet = new Set();
      voicingBoxes.forEach((vb, i) => { if (voicMidiCount.get(vb.midi) > 1) voicDupSet.add(i); });
      const voicStroke = voicingDrop ? '#00e5ff' : '#ffd740';
      const voicBadge = voicingDrop ? '#00e5ff' : '#CC79A7';
      drawVoicingBoxes(svg, voicingBoxes.map(vb => vb.vp), voicStroke, voicBadge, voicDupSet);
    }
  }

  // Basic chord bounding boxes (no shell/inversion/drop)
  if (currentMode === 'chord' && !shellVoicing && voicingInversion === 0 && !voicingDrop && hasChordNotes) {
    const chordPCS = getBuilderPCS();
    if (chordPCS && chordPCS.length >= 3) {
      const sorted = [...chordPCS].sort((a, b) => a - b);
      const basicOffsets = sorted.map(v => v - sorted[0]);
      const basicBoxes = [];
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const midi = midiNote(row, col);
          if (pitchClass(midi) !== rootPC) continue;
          const vp = calcVoicingPositions(row, col, basicOffsets);
          if (!vp) continue;
          basicBoxes.push({ midi, vp });
        }
      }
      basicBoxes.sort((a, b) => a.midi - b.midi);
      lastComputedBoxes = basicBoxes.map(bb => ({
        midiNotes: bb.vp.positions.map(p => baseMidi() + p.row * ROW_INTERVAL + p.col).sort((a, b) => a - b)
      }));
      const basicMidiCount = new Map();
      basicBoxes.forEach(bb => basicMidiCount.set(bb.midi, (basicMidiCount.get(bb.midi) || 0) + 1));
      const basicDupSet = new Set();
      basicBoxes.forEach((bb, i) => { if (basicMidiCount.get(bb.midi) > 1) basicDupSet.add(i); });
      drawVoicingBoxes(svg, basicBoxes.map(bb => bb.vp), '#ffd740', '#CC79A7', basicDupSet);
    }
  }

  // Info
  const infoEl = document.getElementById('info-text');
  if (currentMode === 'scale') {
    const scale = SCALES[currentScaleIdx];
    const notes = scale.pcs.map(pc => NOTE_NAMES_SHARP[(pc + currentKey) % 12]);
    infoEl.textContent = activeLabel + ' (' + scale.pcs.length + '音) : ' + notes.join(' - ');
  } else {
    const pcs = getBuilderPCS();
    if (pcs) {
      const notes = pcs.map(pc => NOTE_NAMES_SHARP[(pc + rootPC) % 12]);
      let txt = activeLabel + ' (' + pcs.length + '音) : ' + notes.join(' - ');
      if (bBass !== null) txt += ' / ' + NOTE_NAMES_SHARP[bBass];
      const mods = [];
      if (shellVoicing) {
        let shellLabel = 'Shell ' + shellVoicing.split('').join('-');
        if (shellExtension > 0) shellLabel += ' +' + shellExtension;
        mods.push(shellLabel);
      }
      if (voicingRootless) mods.push('Rootless');
      if (!shellVoicing && voicingOmit5) mods.push('Omit5');
      if (voicingOmit3) mods.push('Omit3');
      if (!shellVoicing && voicingInversion > 0) {
        const invNames = ['', '1st Inv', '2nd Inv', '3rd Inv'];
        mods.push(invNames[voicingInversion]);
      }
      if (!shellVoicing && voicingDrop) {
        mods.push(voicingDrop === 'drop2' ? 'Drop 2' : 'Drop 3');
      }
      if (mods.length > 0) txt += ' [' + mods.join(', ') + ']';
      infoEl.textContent = txt;
    } else {
      infoEl.textContent = '';
    }
  }

  // Legend
  const swatch = document.getElementById('legend-swatch');
  const ltxt = document.getElementById('legend-text');
  const legendChar = document.getElementById('legend-char');
  const legendGuide3 = document.getElementById('legend-guide3');
  const legendGuide7 = document.getElementById('legend-guide7');
  const legendOmit = document.getElementById('legend-omit');
  if (currentMode === 'scale') {
    swatch.style.background = 'var(--pad-scale)'; ltxt.textContent = 'Scale Note';
    legendChar.style.display = charPCS.size > 0 ? '' : 'none';
    legendGuide3.style.display = 'none'; legendGuide7.style.display = 'none';
    legendOmit.style.display = 'none';
  } else {
    swatch.style.background = 'var(--pad-chord)'; ltxt.textContent = 'Chord Tone';
    legendChar.style.display = 'none';
    legendGuide3.style.display = guide3PCS.size > 0 ? '' : 'none';
    legendGuide7.style.display = guide7PCS.size > 0 ? '' : 'none';
    legendOmit.style.display = omittedPCS.size > 0 ? '' : 'none';
  }

  // Staff notation
  const boxMidi = (selectedVoicingBoxIdx !== null && lastComputedBoxes[selectedVoicingBoxIdx])
    ? lastComputedBoxes[selectedVoicingBoxIdx].midiNotes : null;
  renderStaff(currentMode, rootPC, activePCS, omittedPCS, qualityPCS, boxMidi);

  // Instrument diagrams (guitar + piano)
  lastRenderRootPC = rootPC;
  lastRenderActivePCS = new Set(activePCS);
  renderGuitarDiagram(rootPC, activePCS);
  renderPianoDisplay(rootPC, activePCS);

  // Diatonic chord bar
  renderDiatonicBar();
}

// ========================================
// STAFF NOTATION
// ========================================
function renderStaff(mode, rootPC, activePCS, omittedPCS, qualityPCS, overrideMidiNotes) {
  const staffSvg = document.getElementById('staff-notation');
  let midiNotes;
  if (overrideMidiNotes && overrideMidiNotes.length > 0) {
    midiNotes = [...overrideMidiNotes].sort((a, b) => a - b);
  } else if (mode === 'scale') {
    if (activePCS.size === 0) {
      staffSvg.style.display = 'none'; staffSvg.setAttribute('height', 0); return;
    }
    // Scale mode: render scale notes ascending from root over 1 octave
    const pcsArr = [...activePCS].map(pc => (pc - rootPC + 12) % 12).sort((a, b) => a - b);
    const staffBase = 60 + rootPC; // C4 octave (fixed — shows pitch classes, not position)
    midiNotes = pcsArr.map(iv => staffBase + iv);
  } else {
    // Chord mode
    const chordPCS = getBuilderPCS();
    if (!chordPCS || chordPCS.length < 1) {
      // No quality selected yet — show root or activePCS
      if (activePCS.size > 0) {
        const pcsArr = [...activePCS].map(pc => (pc - rootPC + 12) % 12).sort((a, b) => a - b);
        const staffBase = 48 + rootPC; // C3 octave (fixed)
        midiNotes = pcsArr.map(iv => staffBase + iv);
      } else if (rootPC !== null && rootPC !== undefined) {
        // Root only selected, activePCS is empty but we know the root
        midiNotes = [48 + rootPC];
      } else {
        staffSvg.style.display = 'none'; staffSvg.setAttribute('height', 0); return;
      }
    } else {
    // Staff always shows all chord tones (voicing is a performance choice, not theory)
    const allIntervals = [...chordPCS].sort((a, b) => a - b);
    if (overrideMidiNotes) {
      midiNotes = overrideMidiNotes;
    } else {
      const staffBase = 48 + rootPC; // C3 octave (fixed)
      midiNotes = allIntervals.map(iv => staffBase + iv);
    }
    }
  }

  // Staff config
  const W = DIAGRAM_WIDTH, staffLineGap = 8;
  const trebleTop = 20; // top line of treble staff (F5)
  const bassTop = trebleTop + 4 * staffLineGap + 30; // top line of bass staff (A3)
  const totalH = bassTop + 4 * staffLineGap + 30;
  staffSvg.style.display = '';
  staffSvg.setAttribute('width', W);
  staffSvg.setAttribute('height', totalH);
  staffSvg.innerHTML = '';

  // Draw staff lines
  const staffLeft = 40, staffRight = W - 20;
  for (let i = 0; i < 5; i++) {
    // Treble
    const ty = trebleTop + i * staffLineGap;
    const tl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tl.setAttribute('x1', staffLeft); tl.setAttribute('y1', ty);
    tl.setAttribute('x2', staffRight); tl.setAttribute('y2', ty);
    tl.setAttribute('stroke', '#666'); tl.setAttribute('stroke-width', 1);
    staffSvg.appendChild(tl);
    // Bass
    const by = bassTop + i * staffLineGap;
    const bl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    bl.setAttribute('x1', staffLeft); bl.setAttribute('y1', by);
    bl.setAttribute('x2', staffRight); bl.setAttribute('y2', by);
    bl.setAttribute('stroke', '#666'); bl.setAttribute('stroke-width', 1);
    staffSvg.appendChild(bl);
  }

  // Clef labels
  const trebleClef = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  trebleClef.setAttribute('x', 14); trebleClef.setAttribute('y', trebleTop + 28);
  trebleClef.setAttribute('font-size', '36px'); trebleClef.setAttribute('fill', '#999');
  trebleClef.textContent = '𝄞';
  staffSvg.appendChild(trebleClef);
  const bassClef = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  bassClef.setAttribute('x', 14); bassClef.setAttribute('y', bassTop + 16);
  bassClef.setAttribute('font-size', '24px'); bassClef.setAttribute('fill', '#999');
  bassClef.textContent = '𝄢';
  staffSvg.appendChild(bassClef);

  // MIDI to staff Y position
  // Treble: bottom line = E4(64), top line = F5(77). Each semitone = half step but staff uses diatonic.
  // Map: use note position in C major scale-like mapping
  // Staff position: 0 = middle C (C4=60). Each +1 = one diatonic step up (line or space)
  function midiToStaffPos(midi) {
    const octave = Math.floor(midi / 12) - 1; // C4 = octave 4
    const pc = midi % 12;
    // Pitch class to diatonic position within octave: C=0,D=1,E=2,F=3,G=4,A=5,B=6
    const pcToPos = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6];
    const isSharp = [0, 1, 0, 1, 0, 0, 1, 0, 1, 0, 1, 0][pc];
    return { pos: (octave - 4) * 7 + pcToPos[pc], sharp: isSharp };
  }

  // Staff pos 0 = C4 (middle C). Treble staff bottom line (E4) = pos 2. Y coords:
  // Middle C (pos 0): trebleTop + 5 * staffLineGap (one ledger line below treble)
  const middleCY = trebleTop + 5 * staffLineGap;
  function posToY(pos) {
    return middleCY - pos * (staffLineGap / 2);
  }

  // Draw notes
  const noteX = staffLeft + 80;
  const noteSpacing = 50;
  midiNotes.forEach((midi, idx) => {
    const { pos, sharp } = midiToStaffPos(midi);
    const ny = posToY(pos);
    const nx = noteX + idx * noteSpacing;

    // Ledger lines
    // Middle C ledger (between staves): pos 0
    if (pos <= 0) {
      // Below treble: ledger lines at pos 0, -2, -4, ...
      for (let lp = 0; lp >= pos; lp -= 2) {
        const ly = posToY(lp);
        // Only draw if below treble staff (pos < 2) or above bass staff
        if (ly > trebleTop + 4 * staffLineGap && ly < bassTop) {
          const ll = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          ll.setAttribute('x1', nx - 10); ll.setAttribute('y1', ly);
          ll.setAttribute('x2', nx + 10); ll.setAttribute('y2', ly);
          ll.setAttribute('stroke', '#666'); ll.setAttribute('stroke-width', 1);
          staffSvg.appendChild(ll);
        }
      }
    }
    if (pos >= 12) {
      // Above treble: ledger lines at pos 12, 14, ...
      for (let lp = 12; lp <= pos; lp += 2) {
        const ly = posToY(lp);
        if (ly < trebleTop) {
          const ll = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          ll.setAttribute('x1', nx - 10); ll.setAttribute('y1', ly);
          ll.setAttribute('x2', nx + 10); ll.setAttribute('y2', ly);
          ll.setAttribute('stroke', '#666'); ll.setAttribute('stroke-width', 1);
          staffSvg.appendChild(ll);
        }
      }
    }
    // Below bass staff: bass bottom line = B2 (pos = -5)
    if (pos <= -7) {
      for (let lp = -7; lp >= pos; lp -= 2) {
        const ly = posToY(lp);
        if (ly > bassTop + 4 * staffLineGap) {
          const ll = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          ll.setAttribute('x1', nx - 10); ll.setAttribute('y1', ly);
          ll.setAttribute('x2', nx + 10); ll.setAttribute('y2', ly);
          ll.setAttribute('stroke', '#666'); ll.setAttribute('stroke-width', 1);
          staffSvg.appendChild(ll);
        }
      }
    }

    // Note head
    const note = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    note.setAttribute('cx', nx); note.setAttribute('cy', ny);
    note.setAttribute('rx', 5); note.setAttribute('ry', 3.5);
    note.setAttribute('fill', '#fff');
    note.setAttribute('transform', 'rotate(-15 ' + nx + ' ' + ny + ')');
    staffSvg.appendChild(note);

    // Sharp sign
    if (sharp) {
      const sh = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sh.setAttribute('x', nx - 12); sh.setAttribute('y', ny + 4);
      sh.setAttribute('font-size', '12px'); sh.setAttribute('fill', '#ff9800');
      sh.textContent = '♯';
      staffSvg.appendChild(sh);
    }

    // Degree label above note
    const pc = midi % 12;
    const interval = ((pc - rootPC) % 12 + 12) % 12;
    const deg = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    deg.setAttribute('x', nx); deg.setAttribute('y', ny - 10);
    deg.setAttribute('text-anchor', 'middle');
    deg.setAttribute('font-size', '9px'); deg.setAttribute('font-weight', '600');
    deg.setAttribute('fill', interval === 0 ? '#E69F00' : '#aaa');
    deg.textContent = SCALE_DEGREE_NAMES[interval];
    staffSvg.appendChild(deg);

    // Note name label below
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', nx); label.setAttribute('y', totalH - 4);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('font-size', '9px'); label.setAttribute('fill', '#999');
    label.textContent = NOTE_NAMES_SHARP[pc];
    staffSvg.appendChild(label);
  });
}

// ========================================
// GUITAR DIAGRAM
// ========================================
// Colors: white/black clean style
const INST_ROOT_COLOR = '#333';         // dark (root)
const INST_ACTIVE_COLOR = '#666';       // medium gray (active notes)
const INST_ROOT_TEXT = '#fff';
const INST_ACTIVE_TEXT = '#fff';
const DIAGRAM_WIDTH = 564;              // shared width for pad, guitar & piano (matches pad grid)
let showGuitar = true;
let showPiano = true;
let showStaff = true;
let showSound = true;
let guitarLabelMode = 'name'; // 'name' or 'degree'

function toggleInstrument(which) {
  if (which === 'guitar') showGuitar = !showGuitar;
  if (which === 'piano') showPiano = !showPiano;
  if (which === 'staff') showStaff = !showStaff;
  if (which === 'sound') showSound = !showSound;
  document.getElementById('inst-toggle-guitar').classList.toggle('active', showGuitar);
  document.getElementById('inst-toggle-piano').classList.toggle('active', showPiano);
  document.getElementById('inst-toggle-staff').classList.toggle('active', showStaff);
  document.getElementById('inst-toggle-sound').classList.toggle('active', showSound);
  document.getElementById('guitar-wrap').style.display = showGuitar ? '' : 'none';
  document.getElementById('piano-wrap-display').style.display = showPiano ? '' : 'none';
  document.getElementById('staff-area').style.display = showStaff ? '' : 'none';
  document.getElementById('sound-controls').style.display = showSound ? '' : 'none';
  document.getElementById('guitar-label-btn').style.display = showGuitar ? '' : 'none';
  render();
}

function toggleGuitarLabelMode() {
  guitarLabelMode = guitarLabelMode === 'name' ? 'degree' : 'name';
  document.getElementById('guitar-label-btn').textContent = guitarLabelMode === 'name' ? '音名' : '度数';
  render();
}

function renderGuitarDiagram(rootPC, pcsSet) {
  const svg = document.getElementById('guitar-diagram');
  if (!pcsSet) pcsSet = new Set();

  svg.innerHTML = '';

  const solo = showGuitar && !showPiano;
  const numFrets = 21;
  const leftM = 16;
  const topM = solo ? 10 : 6;
  const fretW = Math.floor((DIAGRAM_WIDTH - leftM - 12) / numFrets);
  const strH = solo ? 22 : 14;
  const nutX = leftM;
  const W = DIAGRAM_WIDTH;
  const H = topM + 5 * strH + (solo ? 30 : 22);
  svg.setAttribute('width', W); svg.setAttribute('height', H);

  const strings = [64, 59, 55, 50, 45, 40];
  const strNames = ['E', 'B', 'G', 'D', 'A', 'E'];

  // Nut (thick black line)
  const nutLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  nutLine.setAttribute('x1', nutX); nutLine.setAttribute('y1', topM);
  nutLine.setAttribute('x2', nutX); nutLine.setAttribute('y2', topM + 5 * strH);
  nutLine.setAttribute('stroke', '#ccc'); nutLine.setAttribute('stroke-width', 4);
  svg.appendChild(nutLine);

  // Fret lines
  for (let f = 1; f <= numFrets; f++) {
    const fx = nutX + f * fretW;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', fx); line.setAttribute('y1', topM);
    line.setAttribute('x2', fx); line.setAttribute('y2', topM + 5 * strH);
    line.setAttribute('stroke', '#555'); line.setAttribute('stroke-width', 1);
    svg.appendChild(line);
  }

  // String lines
  for (let s = 0; s < 6; s++) {
    const sy = topM + s * strH;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', nutX); line.setAttribute('y1', sy);
    line.setAttribute('x2', nutX + numFrets * fretW); line.setAttribute('y2', sy);
    line.setAttribute('stroke', '#888'); line.setAttribute('stroke-width', s >= 4 ? 2 : 1);
    svg.appendChild(line);
  }

  // Fret markers
  const markerFrets = [3, 5, 7, 9, 15, 17, 19, 21];
  const doubleMarker = [12];
  const markerY = topM + 2.5 * strH;
  markerFrets.forEach(f => {
    const mx = nutX + (f - 0.5) * fretW;
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', mx); dot.setAttribute('cy', markerY);
    dot.setAttribute('r', 2.5); dot.setAttribute('fill', '#444');
    svg.appendChild(dot);
  });
  doubleMarker.forEach(f => {
    const mx = nutX + (f - 0.5) * fretW;
    [topM + 1.5 * strH, topM + 3.5 * strH].forEach(dy => {
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', mx); dot.setAttribute('cy', dy);
      dot.setAttribute('r', 2.5); dot.setAttribute('fill', '#444');
      svg.appendChild(dot);
    });
  });

  // String names
  for (let s = 0; s < 6; s++) {
    const sy = topM + s * strH;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', nutX - 9); t.setAttribute('y', sy + 4);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', '10px'); t.setAttribute('fill', '#aaa');
    t.setAttribute('font-weight', '700');
    t.textContent = strNames[s];
    svg.appendChild(t);
  }

  // Fret numbers
  for (let f = 1; f <= numFrets; f++) {
    const fx = nutX + (f - 0.5) * fretW;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', fx); t.setAttribute('y', topM + 5 * strH + 14);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', '8px'); t.setAttribute('fill', '#888');
    t.textContent = f;
    svg.appendChild(t);
  }

  // Note dots (scale/chord tones) with labels
  for (let s = 0; s < 6; s++) {
    const openPC = strings[s] % 12;
    const sy = topM + s * strH;
    for (let f = 0; f <= numFrets; f++) {
      const pc = (openPC + f) % 12;
      if (!pcsSet.has(pc)) continue;
      const isRoot = pc === rootPC;
      const fx = f === 0 ? nutX - 2 : nutX + (f - 0.5) * fretW;
      const r = f === 0 ? (solo ? 7 : 5) : (solo ? 10 : 7);
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', fx); dot.setAttribute('cy', sy);
      dot.setAttribute('r', r);
      dot.setAttribute('fill', isRoot ? INST_ROOT_COLOR : INST_ACTIVE_COLOR);
      dot.setAttribute('opacity', '0.9');
      svg.appendChild(dot);
      // Label inside dot
      if (f > 0) {
        const iv = ((pc - rootPC) + 12) % 12;
        const labelText = guitarLabelMode === 'degree' ? SCALE_DEGREE_NAMES[iv] : NOTE_NAMES_SHARP[pc];
        const lt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        lt.setAttribute('x', fx); lt.setAttribute('y', sy + (solo ? 4 : 3));
        lt.setAttribute('text-anchor', 'middle');
        const fs = solo ? (labelText.length > 2 ? '7px' : '9px') : (labelText.length > 2 ? '5px' : '6px');
        lt.setAttribute('font-size', fs);
        lt.setAttribute('fill', isRoot ? INST_ROOT_TEXT : INST_ACTIVE_TEXT);
        lt.setAttribute('font-weight', '700');
        lt.textContent = labelText;
        svg.appendChild(lt);
      }
    }
  }

  // Guitar input: selected fret markers (orange ring)
  for (let s = 0; s < 6; s++) {
    if (guitarSelectedFrets[s] !== null) {
      const f = guitarSelectedFrets[s];
      const sy = topM + s * strH;
      const fx = f === 0 ? nutX - 2 : nutX + (f - 0.5) * fretW;
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring.setAttribute('cx', fx); ring.setAttribute('cy', sy);
      ring.setAttribute('r', solo ? 12 : 9);
      ring.setAttribute('fill', '#fff'); ring.setAttribute('opacity', '0.95');
      ring.setAttribute('stroke', '#333'); ring.setAttribute('stroke-width', 2);
      svg.appendChild(ring);
      // Label inside (respects guitar label mode)
      const pc = (strings[s] % 12 + f) % 12;
      const iv = ((pc - rootPC) + 12) % 12;
      const labelText = guitarLabelMode === 'degree' ? SCALE_DEGREE_NAMES[iv] : NOTE_NAMES_SHARP[pc];
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', fx); label.setAttribute('y', sy + (solo ? 5 : 4));
      label.setAttribute('text-anchor', 'middle');
      const selFs = solo ? (labelText.length > 2 ? '8px' : '10px') : (labelText.length > 2 ? '6px' : '8px');
      label.setAttribute('font-size', selFs); label.setAttribute('fill', '#333');
      label.setAttribute('font-weight', '700');
      label.textContent = labelText;
      svg.appendChild(label);
    }
  }

  // Clickable hit areas for each string×fret (transparent rects)
  for (let s = 0; s < 6; s++) {
    const sy = topM + s * strH - strH / 2;
    for (let f = 0; f <= numFrets; f++) {
      const fx = f === 0 ? 0 : nutX + (f - 1) * fretW;
      const fw = f === 0 ? nutX : fretW;
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', fx); hit.setAttribute('y', sy);
      hit.setAttribute('width', fw); hit.setAttribute('height', strH);
      hit.setAttribute('fill', 'transparent');
      hit.setAttribute('cursor', 'pointer');
      hit.dataset.string = s;
      hit.dataset.fret = f;
      hit.addEventListener('click', function() {
        toggleGuitarFret(parseInt(this.dataset.string), parseInt(this.dataset.fret));
      });
      svg.appendChild(hit);
    }
  }
}

// ========================================
// PIANO DISPLAY
// ========================================
function renderPianoDisplay(rootPC, pcsSet) {
  const svg = document.getElementById('piano-display');
  if (!pcsSet) pcsSet = new Set();

  svg.innerHTML = '';

  const solo = showPiano && !showGuitar;
  const numOctaves = 4; // C1 to B4 (matches pad range)
  const startOctave = 1;
  const whiteH = solo ? 80 : 50, blackH = solo ? 52 : 32;
  const numWhites = numOctaves * 7;
  const W = DIAGRAM_WIDTH;
  const startX = 8, startY = 2;
  const whiteW = (W - startX - 15) / numWhites;
  const blackW = whiteW * 0.7;
  const H = whiteH + (solo ? 22 : 16);
  svg.setAttribute('width', W); svg.setAttribute('height', H);

  const whiteNotes = [0,2,4,5,7,9,11];
  const blackNotes = [1,3,6,8,10];
  const blackPositions = [0, 1, 3, 4, 5];

  // White keys
  let wx = startX;
  for (let oct = 0; oct < numOctaves; oct++) {
    for (let i = 0; i < 7; i++) {
      const pc = whiteNotes[i];
      const isActive = pcsSet.has(pc);
      const isRoot = pc === rootPC;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', wx); rect.setAttribute('y', startY);
      rect.setAttribute('width', whiteW - 1); rect.setAttribute('height', whiteH);
      rect.setAttribute('rx', 1);
      rect.setAttribute('fill', isRoot ? INST_ROOT_COLOR : (isActive ? '#999' : '#eee'));
      rect.setAttribute('stroke', '#bbb'); rect.setAttribute('stroke-width', 0.5);
      svg.appendChild(rect);
      if (isActive || isRoot) {
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', wx + (whiteW - 1) / 2); label.setAttribute('y', startY + whiteH - 6);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('font-size', '10px');
        label.setAttribute('fill', isRoot ? '#fff' : '#333');
        label.setAttribute('font-weight', '700');
        label.textContent = NOTE_NAMES_SHARP[pc];
        svg.appendChild(label);
      }
      wx += whiteW;
    }
  }

  // Black keys
  for (let oct = 0; oct < numOctaves; oct++) {
    for (let i = 0; i < 5; i++) {
      const pc = blackNotes[i];
      const isActive = pcsSet.has(pc);
      const isRoot = pc === rootPC;
      const whiteIdx = blackPositions[i] + oct * 7;
      const bx = startX + (whiteIdx + 1) * whiteW - blackW / 2;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', bx); rect.setAttribute('y', startY);
      rect.setAttribute('width', blackW); rect.setAttribute('height', blackH);
      rect.setAttribute('rx', 1);
      rect.setAttribute('fill', isRoot ? INST_ROOT_COLOR : (isActive ? '#555' : '#222'));
      rect.setAttribute('stroke', '#000'); rect.setAttribute('stroke-width', 0.5);
      svg.appendChild(rect);
      if (isActive || isRoot) {
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', bx + blackW / 2); label.setAttribute('y', startY + blackH - 3);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('font-size', '8px'); label.setAttribute('fill', '#ddd');
        label.setAttribute('font-weight', '700');
        label.textContent = NOTE_NAMES_SHARP[pc];
        svg.appendChild(label);
      }
    }
  }

  // Piano selected note markers (white circles)
  for (let oct = 0; oct < numOctaves; oct++) {
    for (let i = 0; i < 12; i++) {
      const midi = 36 + oct * 12 + i;
      if (!pianoSelectedNotes.has(midi)) continue;
      const isWhite = [0,2,4,5,7,9,11].includes(i);
      let cx, cy;
      if (isWhite) {
        const whiteIdx = [0,0,1,1,2,3,3,4,4,5,5,6][i];
        cx = startX + (oct * 7 + whiteIdx) * whiteW + (whiteW - 1) / 2;
        cy = startY + whiteH - 12;
      } else {
        const blackIdx = [0,0,1,0,0,0,2,0,3,0,4,0][i];
        const blackPos = [0, 1, 3, 4, 5];
        const whiteOff = blackPos[blackIdx] + oct * 7;
        cx = startX + (whiteOff + 1) * whiteW;
        cy = startY + blackH - 10;
      }
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      marker.setAttribute('cx', cx); marker.setAttribute('cy', cy);
      marker.setAttribute('r', 5);
      marker.setAttribute('fill', '#fff');
      marker.setAttribute('stroke', '#333'); marker.setAttribute('stroke-width', 1.5);
      svg.appendChild(marker);
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', cx); label.setAttribute('y', cy + 3);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('font-size', '6px'); label.setAttribute('fill', '#333');
      label.setAttribute('font-weight', '700');
      label.textContent = NOTE_NAMES_SHARP[i];
      svg.appendChild(label);
    }
  }

  // Piano click handlers (white keys)
  for (let oct = 0; oct < numOctaves; oct++) {
    for (let i = 0; i < 7; i++) {
      const pc = whiteNotes[i];
      const midi = 36 + oct * 12 + pc;
      const kx = startX + (oct * 7 + i) * whiteW;
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', kx); hit.setAttribute('y', startY + blackH);
      hit.setAttribute('width', whiteW); hit.setAttribute('height', whiteH - blackH);
      hit.setAttribute('fill', 'transparent'); hit.setAttribute('cursor', 'pointer');
      hit.dataset.midi = midi;
      hit.addEventListener('click', function() { togglePianoNote(parseInt(this.dataset.midi)); });
      svg.appendChild(hit);
    }
  }
  // Piano click handlers (black keys - on top)
  for (let oct = 0; oct < numOctaves; oct++) {
    for (let i = 0; i < 5; i++) {
      const pc = blackNotes[i];
      const midi = 36 + oct * 12 + pc;
      const whiteIdx = blackPositions[i] + oct * 7;
      const bx = startX + (whiteIdx + 1) * whiteW - blackW / 2;
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', bx); hit.setAttribute('y', startY);
      hit.setAttribute('width', blackW); hit.setAttribute('height', blackH);
      hit.setAttribute('fill', 'transparent'); hit.setAttribute('cursor', 'pointer');
      hit.dataset.midi = midi;
      hit.addEventListener('click', function() { togglePianoNote(parseInt(this.dataset.midi)); });
      svg.appendChild(hit);
    }
  }

  // Octave labels
  for (let oct = 0; oct < numOctaves; oct++) {
    const ox = startX + oct * 7 * whiteW;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', ox + 2); t.setAttribute('y', startY + whiteH + 11);
    t.setAttribute('font-size', '8px'); t.setAttribute('fill', '#888');
    t.textContent = 'C' + (startOctave + oct);
    svg.appendChild(t);
  }
}

// ========================================
// INSTRUMENT INPUT
// ========================================
const GUITAR_OPEN_MIDI = [64, 59, 55, 50, 45, 40]; // E4, B3, G3, D3, A2, E2
let guitarSelectedFrets = [null, null, null, null, null, null];
let pianoSelectedNotes = new Set(); // MIDI note numbers
let instrumentInputActive = false;

function getAllInputMidiNotes() {
  const notes = [];
  for (let s = 0; s < 6; s++) {
    if (guitarSelectedFrets[s] !== null) {
      notes.push(GUITAR_OPEN_MIDI[s] + guitarSelectedFrets[s]);
    }
  }
  pianoSelectedNotes.forEach(n => {
    if (!notes.includes(n)) notes.push(n);
  });
  return notes.sort((a, b) => a - b);
}

function toggleGuitarFret(stringIdx, fret) {
  if (guitarSelectedFrets[stringIdx] === fret) {
    guitarSelectedFrets[stringIdx] = null;
  } else {
    guitarSelectedFrets[stringIdx] = fret;
  }
  updateInstrumentInput();
}

function togglePianoNote(midi) {
  if (pianoSelectedNotes.has(midi)) {
    pianoSelectedNotes.delete(midi);
  } else {
    pianoSelectedNotes.add(midi);
  }
  updateInstrumentInput();
}

function updateInstrumentInput() {
  const notes = getAllInputMidiNotes();
  instrumentInputActive = notes.length > 0;
  if (notes.length === 0) {
    document.querySelectorAll('.instrument-highlight').forEach(el => el.remove());
    const detectEl = document.getElementById('midi-detect');
    detectEl.innerHTML = '';
    // detectEl always visible (no layout shift)
    renderGuitarDiagram(lastRenderRootPC, lastRenderActivePCS);
    renderPianoDisplay(lastRenderRootPC, lastRenderActivePCS);
    return;
  }
  const detectEl = document.getElementById('midi-detect');
  // detectEl always visible (no layout shift)
  const noteNames = notes.map(n => NOTE_NAMES_SHARP[n % 12]);
  const candidates = detectChord(notes);
  const inputPCS = new Set(notes.map(n => n % 12));
  if (candidates.length > 0) {
    const best = candidates[0];
    let html = '<div style="color:var(--accent);font-weight:700;font-size:1.1rem;">' + best.name + '</div>';
    if (candidates.length > 1) {
      html += '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;">';
      candidates.slice(1).forEach(c => {
        html += '<span style="font-size:0.6rem;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.08);color:var(--text-muted);">' + c.name + '</span>';
      });
      html += '</div>';
    }
    html += '<div style="font-size:0.6rem;color:var(--text-muted);margin-top:1px;">Notes: ' + noteNames.join(' ') + '</div>';
    detectEl.innerHTML = html;
    renderGuitarDiagram(best.rootPC, inputPCS);
    renderPianoDisplay(best.rootPC, inputPCS);
  } else {
    detectEl.textContent = noteNames.join(' ');
    renderGuitarDiagram(null, inputPCS);
    renderPianoDisplay(null, inputPCS);
  }
  highlightInstrumentPads(notes);
}

function highlightInstrumentPads(midiNotes) {
  document.querySelectorAll('.instrument-highlight').forEach(el => el.remove());
  const svg = document.getElementById('pad-grid');
  const bm = baseMidi();
  const noteSet = new Set(midiNotes);
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const midi = bm + row * ROW_INTERVAL + col;
      if (noteSet.has(midi)) {
        const x = MARGIN + col * (PAD_SIZE + PAD_GAP);
        const y = MARGIN + (ROWS - 1 - row) * (PAD_SIZE + PAD_GAP);
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x); rect.setAttribute('y', y);
        rect.setAttribute('width', PAD_SIZE); rect.setAttribute('height', PAD_SIZE);
        rect.setAttribute('rx', 6);
        rect.setAttribute('fill', 'none');
        rect.setAttribute('stroke', '#fff'); rect.setAttribute('stroke-width', 3);
        rect.setAttribute('class', 'instrument-highlight');
        rect.setAttribute('pointer-events', 'none');
        svg.appendChild(rect);
      }
    }
  }
}

function clearInstrumentInput() {
  guitarSelectedFrets = [null, null, null, null, null, null];
  pianoSelectedNotes.clear();
  instrumentInputActive = false;
  document.querySelectorAll('.instrument-highlight').forEach(el => el.remove());
  const detectEl = document.getElementById('midi-detect');
  detectEl.innerHTML = '';
  // detectEl always visible (no layout shift)
  renderGuitarDiagram(lastRenderRootPC, lastRenderActivePCS);
  renderPianoDisplay(lastRenderRootPC, lastRenderActivePCS);
}

function playInstrumentInput() {
  const notes = getAllInputMidiNotes();
  if (notes.length > 0) {
    playMidiNotes(notes, 1.0);
  }
}

// State for restoring diagrams when MIDI notes are released
let lastRenderRootPC = 0;
let lastRenderActivePCS = new Set();

// ========================================
// MODE & UI CONTROLS
// ========================================
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-scale').classList.toggle('active', mode === 'scale');
  document.getElementById('mode-chord').classList.toggle('active', mode === 'chord');
  document.getElementById('scale-panel').style.display = mode === 'scale' ? '' : 'none';
  document.getElementById('chord-panel').style.display = mode === 'chord' ? '' : 'none';
  if (mode === 'chord' && bStep === 0) {
    bRoot = currentKey; // carry over key
    setBuilderStep(1);
  }
  render();
}

// ======== SCALE MODE INIT ========
function initKeyButtons() {
  const container = document.getElementById('key-buttons');
  const blackKeys = [1,3,6,8,10];
  NOTE_NAMES_SHARP.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'key-btn' + (i === currentKey ? ' active' : '') + (blackKeys.includes(i) ? ' black-key' : '');
    btn.textContent = NOTE_NAMES_FLAT[i] !== name ? name + '/' + NOTE_NAMES_FLAT[i] : name;
    btn.onclick = () => { currentKey = i; updateKeyButtons(); render(); };
    container.appendChild(btn);
  });
}
function updateKeyButtons() {
  document.querySelectorAll('#key-buttons .key-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentKey);

// ======== CHORD BUILDER ========
function setBuilderStep(step) {
  bStep = step;
  document.getElementById('step1').style.display = step === 1 ? '' : 'none';
  document.getElementById('step2').style.display = step === 2 ? '' : 'none';
  if (!bassInputMode) {
    const label = step === 2 ? 'Tension' : (bRoot !== null ? 'Quality' : 'Root');
    document.getElementById('step-label').textContent = label;
    document.getElementById('step-label').style.background = '';
  }
  document.getElementById('btn-next').style.display = 'none';
  updateChordDisplay();
}

// ======== SWIPE NAVIGATION (Step 1 ↔ Step 2) ========
(function initSwipe() {
  let _sx = 0, _sy = 0;
  const MIN_DX = 50; // minimum horizontal distance
  const MAX_DY_RATIO = 0.7; // max vertical/horizontal ratio (prevent diagonal)

  function onTouchStart(e) { _sx = e.touches[0].clientX; _sy = e.touches[0].clientY; }
  function onTouchEnd(e) {
    const dx = e.changedTouches[0].clientX - _sx;
    const dy = Math.abs(e.changedTouches[0].clientY - _sy);
    if (Math.abs(dx) < MIN_DX || dy / Math.abs(dx) > MAX_DY_RATIO) return;
    if (dx < 0 && bStep === 1 && bQuality) {
      // Swipe left → Tension
      setBuilderStep(2);
    } else if (dx > 0 && bStep === 2) {
      // Swipe right → Root + Quality
      setBuilderStep(1);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const sc = document.querySelector('.step-container');
    if (!sc) return;
    sc.addEventListener('touchstart', onTouchStart, { passive: true });
    sc.addEventListener('touchend', onTouchEnd, { passive: true });
  });
})();

function updateChordDisplay() {
  const nameEl = document.getElementById('chord-name');
  nameEl.textContent = getBuilderChordName() || '—';
  // Auto bass from voicing (inversion/drop) when no explicit on-chord bass
  let displayBass = bBass;
  if (displayBass === null && bRoot !== null && bQuality) {
    const chordPCS = getBuilderPCS();
    if (chordPCS && chordPCS.length >= 3 && !shellVoicing) {
      if (voicingInversion > 0 || voicingDrop) {
        const inv = Math.min(voicingInversion, chordPCS.length - 1);
        const result = calcVoicingOffsets(chordPCS, inv, voicingDrop);
        const bassAbsPC = ((bRoot + result.bassInterval) % 12 + 12) % 12;
        if (bassAbsPC !== bRoot) displayBass = bassAbsPC;
      }
    }
  }
  document.getElementById('chord-bass').textContent = displayBass !== null ? NOTE_NAMES_SHARP[displayBass] : '';
}

function builderClear() {
  bRoot = null; bQuality = null; bTension = null; bBass = null;
  bassInputMode = false;
  document.getElementById('step-label').style.background = '';
  setBuilderStep(1);
  clearPianoSelection('piano-keyboard');
  clearQualitySelection();
  clearTensionSelection();
  render();
}

function builderBack() {
  if (bassInputMode) {
    bassInputMode = false;
    if (bQuality) setBuilderStep(2);
    else setBuilderStep(1);
    render();
    return;
  }
  if (bStep === 2) {
    bTension = null;
    clearTensionSelection();
    setBuilderStep(1);
  } else if (bStep === 1) {
    if (bQuality) {
      bQuality = null;
      clearQualitySelection();
      setBuilderStep(1);
    } else if (bRoot !== null) {
      bRoot = null;
      clearPianoSelection('piano-keyboard');
      setBuilderStep(1);
    }
  }
  render();
}

function builderNext() {
  // No longer used in 2-step design (on-chord handled by / button)
}

function selectRoot(pc) {
  if (bassInputMode) {
    // In bass input mode, set bass note instead of root
    bBass = pc;
    bassInputMode = false;
    // Restore root highlight (bass selection was temporary use of this keyboard)
    if (bRoot !== null) highlightPianoKey('piano-keyboard', bRoot);
    if (bQuality) { setBuilderStep(2); }
    else { setBuilderStep(1); }
    updateChordDisplay();
    render();
    return;
  }
  bRoot = pc;
  bQuality = null; bTension = null; bBass = null;
  selectedVoicingBoxIdx = null;
  highlightPianoKey('piano-keyboard', pc);
  clearQualitySelection();
  clearTensionSelection();
  setBuilderStep(1); // Stay on step 1 (Root + Quality visible)
  render();
}

function selectQuality(q) {
  bQuality = q;
  bTension = null;
  selectedVoicingBoxIdx = null;
  highlightQuality(q);
  setBuilderStep(2); // Go to Tension
  render();
  playCurrentChord();
}

function selectTension(t, el) {
  if (bTension && bTension.label === t.label) {
    bTension = null;
    clearTensionSelection();
  } else {
    bTension = t;
    clearTensionSelection();
    el.classList.add('selected');
  }
  selectedVoicingBoxIdx = null;
  updateChordDisplay();
  render();
  playCurrentChord();
}

function startOnChord() {
  if (!bQuality && bRoot === null) return;
  // Toggle bass input mode using the root piano keyboard
  bassInputMode = !bassInputMode;
  if (bassInputMode) {
    if (bStep !== 1) setBuilderStep(1);
    document.getElementById('step-label').textContent = 'Bass Note';
    document.getElementById('step-label').style.background = '#009E73';
  } else {
    if (bQuality) setBuilderStep(2);
    else setBuilderStep(1);
  }
}

function selectBass(pc) {
  bBass = pc;
  highlightPianoKey('onchord-keyboard', pc);
  updateChordDisplay();
  render();
}

// ======== PIANO KEYBOARD ========
function buildPianoKeyboard(containerId, onSelect) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';

  // White keys
  const whites = [{pc:0,name:'C'},{pc:2,name:'D'},{pc:4,name:'E'},{pc:5,name:'F'},{pc:7,name:'G'},{pc:9,name:'A'},{pc:11,name:'B'}];
  const whiteDiv = document.createElement('div');
  whiteDiv.className = 'piano-white';
  whites.forEach(w => {
    const key = document.createElement('div');
    key.className = 'piano-white-key';
    key.dataset.pc = w.pc;
    key.textContent = w.name;
    key.onclick = () => onSelect(w.pc);
    whiteDiv.appendChild(key);
  });
  wrap.appendChild(whiteDiv);

  // Black keys - positioned relative to white keys
  const blackDiv = document.createElement('div');
  blackDiv.className = 'piano-black-keys';
  // Pattern: C#(between C-D), D#(between D-E), gap, F#(between F-G), G#(between G-A), A#(between A-B)
  const blacks = [
    {pc:1, name:'C#', pos:0},
    {pc:3, name:'D#', pos:1},
    {pc:6, name:'F#', pos:3},
    {pc:8, name:'G#', pos:4},
    {pc:10, name:'A#', pos:5},
  ];

  // Create spacers and black keys
  // Each white key takes 1/7 of the width. Black keys sit between them.
  // We use absolute positioning via percentage
  blacks.forEach(b => {
    const key = document.createElement('div');
    key.className = 'piano-black-key';
    key.dataset.pc = b.pc;
    key.textContent = b.name;
    key.style.position = 'absolute';
    key.style.left = `calc(${(b.pos + 1) / 7 * 100}% - 18px)`;
    key.onclick = (e) => { e.stopPropagation(); onSelect(b.pc); };
    blackDiv.appendChild(key);
  });
  wrap.appendChild(blackDiv);
}

function highlightPianoKey(containerId, pc) {
  const wrap = document.getElementById(containerId);
  wrap.querySelectorAll('.piano-white-key, .piano-black-key').forEach(k => {
    k.classList.toggle('selected', parseInt(k.dataset.pc) === pc);
  });
}

function clearPianoSelection(containerId) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  wrap.querySelectorAll('.selected').forEach(k => k.classList.remove('selected'));
}

  // Tension chords (interval as mod 12 for detection)

  tensionChords.forEach(c => {

  });
  return db;
}
const CHORD_DB = buildChordDB();

// Triad-only DB for bass+triad detection
const TRIAD_DB = [
  { name: 'Maj', pcs: [0,4,7] },
  { name: 'm', pcs: [0,3,7] },
  { name: 'dim', pcs: [0,3,6] },
  { name: 'aug', pcs: [0,4,8] },
  { name: 'sus4', pcs: [0,5,7] },
  { name: 'sus2', pcs: [0,2,7] },
];
const TETRAD_DB = [
  { name: '△7', pcs: [0,4,7,11] },
  { name: '7', pcs: [0,4,7,10] },
  { name: 'm7', pcs: [0,3,7,10] },
  { name: 'm△7', pcs: [0,3,7,11] },
  { name: 'm7(b5)', pcs: [0,3,6,10] },
  { name: 'dim7', pcs: [0,3,6,9] },
  { name: '6', pcs: [0,4,7,9] },
  { name: 'm6', pcs: [0,3,7,9] },
  { name: '7sus4', pcs: [0,5,7,10] },
];

function detectChord(midiNotes) {
  if (midiNotes.length < 2) return [];
  const pcs = [...new Set(midiNotes.map(n => n % 12))].sort((a, b) => a - b);
  if (pcs.length < 2) return [];
  const lowestPC = midiNotes.reduce((a, b) => a < b ? a : b) % 12;
  const candidates = [];
  const seen = new Set();
  for (const rootPC of pcs) {
    const intervals = new Set(pcs.map(pc => ((pc - rootPC) + 12) % 12));
    for (const chord of CHORD_DB) {
      // Exact match (allow 1 extra note)
      if (chord.pcs.length <= pcs.length + 1) {
        const matched = chord.pcs.filter(iv => intervals.has(iv)).length;
        if (matched === chord.pcs.length) {
          const extra = pcs.length - chord.pcs.length;
          const isRootPosition = rootPC === lowestPC;
          const score = (isRootPosition ? 100 : 0) + chord.pcs.length * 10 - extra;
          const rootName = NOTE_NAMES_SHARP[rootPC];
          const bass = lowestPC !== rootPC ? ' / ' + NOTE_NAMES_SHARP[lowestPC] : '';
          const name = rootName + chord.name + bass;
          if (!seen.has(name)) {
            seen.add(name);
            candidates.push({ name, rootPC, score });
          }
        }
      }
      // Omit5 match: 4音以上のコードで5度(7)を含む場合、5度省略もチェック
      if (chord.pcs.length >= 4 && chord.pcs.includes(7)) {
        const omit5pcs = chord.pcs.filter(iv => iv !== 7);
        if (omit5pcs.length <= pcs.length + 1) {
          const matched = omit5pcs.filter(iv => intervals.has(iv)).length;
          if (matched === omit5pcs.length) {
            const extra = pcs.length - omit5pcs.length;
            const isRootPosition = rootPC === lowestPC;
            // omit5はexactより少しスコアを下げるが、トライアドよりは上
            const score = (isRootPosition ? 100 : 0) + chord.pcs.length * 10 - extra - 5;
            const rootName = NOTE_NAMES_SHARP[rootPC];
            const bass = lowestPC !== rootPC ? ' / ' + NOTE_NAMES_SHARP[lowestPC] : '';
            // テンションコード(5音以上)は5度省略が普通なのでomit5表記しない
            const omitLabel = chord.pcs.length >= 5 ? '' : '(omit5)';
            const name = rootName + chord.name + omitLabel + bass;
            if (!seen.has(name)) {
              seen.add(name);
              candidates.push({ name, rootPC, score });
            }
          }
        }
      }
    }
  }
  // Bass + Triad detection: 最低音をベースとし、上の音でトライアドを探す
  if (pcs.length >= 3) {
    const upperPCs = pcs.filter(pc => pc !== lowestPC);
    if (upperPCs.length >= 3) {
      for (const triadRoot of upperPCs) {
        const triadIntervals = new Set(upperPCs.map(pc => ((pc - triadRoot) + 12) % 12));
        for (const triad of TRIAD_DB) {
          const matched = triad.pcs.filter(iv => triadIntervals.has(iv)).length;
          if (matched === triad.pcs.length) {
            const triadName = NOTE_NAMES_SHARP[triadRoot] + (triad.name === 'Maj' ? '' : triad.name);
            const bassName = NOTE_NAMES_SHARP[lowestPC];
            const name = triadName + ' / ' + bassName;
            if (!seen.has(name)) {
              seen.add(name);
              // Bass+triadはスコア低め（既存コードネームを優先）
              const isTriadRoot = triadRoot === lowestPC;
              const score = (isTriadRoot ? 100 : 0) + 25;
              candidates.push({ name, rootPC: triadRoot, score });
            }
          }
        }
      }
    }
  }
  // Bass + Tetrad detection: 最低音をベースとし、上の音でテトラッドを探す
  // 5音でルートから5度上に音がない場合、R+4和音の可能性を考える
  if (pcs.length >= 4) {
    const upperPCs = pcs.filter(pc => pc !== lowestPC);
    if (upperPCs.length >= 4) {
      for (const tetRoot of upperPCs) {
        const tetIntervals = new Set(upperPCs.map(pc => ((pc - tetRoot) + 12) % 12));
        for (const tet of TETRAD_DB) {
          const matched = tet.pcs.filter(iv => tetIntervals.has(iv)).length;
          if (matched === tet.pcs.length) {
            const tetName = NOTE_NAMES_SHARP[tetRoot] + tet.name;
            const bassName = NOTE_NAMES_SHARP[lowestPC];
            if (tetRoot === lowestPC) continue; // ルート=ベースならスラッシュ不要（既に検出済み）
            const name = tetName + ' / ' + bassName;
            if (!seen.has(name)) {
              seen.add(name);
              // Bass+tetradはBass+triadより上、ルートポジションコードより下
              const score = 30 + tet.pcs.length * 5;
              candidates.push({ name, rootPC: tetRoot, score });
            }
          }
        }
      }
    }
  }
  // 6th + 7th → 13thテンション表記 リネーム
  // 6thと7thが同時に存在する場合、6→7(13)に変換（テンション表記）
  candidates.forEach(c => {
    const rootIntervals = new Set(pcs.map(pc => ((pc - c.rootPC) + 12) % 12));
    const has7th = rootIntervals.has(10) || rootIntervals.has(11);
    if (has7th) {
      const is7 = rootIntervals.has(10); // b7 → dominant, △7 → major
      const sfx = is7 ? '7' : '△7';
      c.name = c.name.replace(/^([A-G]#?)6\/9(\(omit5\))?/, '$1' + sfx + '(9,13)');
      c.name = c.name.replace(/^([A-G]#?)m6\/9(\(omit5\))?/, '$1m' + sfx + '(9,13)');
      c.name = c.name.replace(/^([A-G]#?)6(\(omit5\))?/, '$1' + sfx + '(13)');
      c.name = c.name.replace(/^([A-G]#?)m6(\(omit5\))?/, '$1m' + sfx + '(13)');
    }
  });
  candidates.sort((a, b) => b.score - a.score);
  return candidates.slice(0, 8);
}

let midiDebounceTimer = null;
const MIDI_DEBOUNCE_MS = 40; // PUSHのシリアルMIDI対策: 40ms以内のノートをまとめる
let midiNoteRemap = null; // null = no remap, 'push-serial' = Push serial→4th chromatic

// PUSHシリアル配列(row間8半音) → 4度クロマチック配列(row間5半音) 変換
const PUSH_SERIAL_BASE = 36;
function pushSerialToFourths(note) {
  const idx = note - PUSH_SERIAL_BASE;
  if (idx < 0 || idx >= 64) return note; // パッド範囲外はそのまま
  const row = Math.floor(idx / 8);
  const col = idx % 8;
  return PUSH_SERIAL_BASE + row * ROW_INTERVAL + col; // ROW_INTERVAL=5
}

function remapMidiNote(note) {
  if (midiNoteRemap === 'push-serial') return pushSerialToFourths(note);
  return note;
}

function onMidiNoteOn(note, velocity) {
  const mapped = remapMidiNote(note);
  midiActiveNotes.add(mapped);
  // Direct noteOn — sustain until physical noteOff arrives
  ensureAudioResumed();
  noteOn(mapped, (velocity || 100) / 127, true);
  scheduleMidiUpdate();
}

function onMidiNoteOff(note) {
  const mapped = remapMidiNote(note);
  midiActiveNotes.delete(mapped);
  noteOff(mapped);
  scheduleMidiUpdate();
}

function scheduleMidiUpdate() {
  if (midiDebounceTimer) clearTimeout(midiDebounceTimer);
  midiDebounceTimer = setTimeout(() => {
    midiDebounceTimer = null;
    updateMidiDisplay();
  }, MIDI_DEBOUNCE_MS);
}

function updateMidiDisplay() {
  const detectEl = document.getElementById('midi-detect');
  const notes = [...midiActiveNotes].sort((a, b) => a - b);
  if (notes.length === 0) {
    detectEl.innerHTML = '';
    // detectEl always visible (no layout shift)
    document.querySelectorAll('.midi-highlight').forEach(el => el.remove());
    // Restore instrument diagrams from builder state
    renderGuitarDiagram(lastRenderRootPC, lastRenderActivePCS);
    renderPianoDisplay(lastRenderRootPC, lastRenderActivePCS);
    return;
  }
  // detectEl always visible (no layout shift)
  const noteNames = notes.map(n => NOTE_NAMES_SHARP[n % 12]);
  const candidates = detectChord(notes);
  if (candidates.length > 0) {
    const best = candidates[0];
    let html = '<div style="color:var(--accent);font-weight:700;font-size:1.1rem;">' + best.name + '</div>';
    if (candidates.length > 1) {
      html += '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;">';
      candidates.slice(1).forEach(c => {
        html += '<span style="font-size:0.6rem;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.08);color:var(--text-muted);">' + c.name + '</span>';
      });
      html += '</div>';
    }
    html += '<div style="font-size:0.6rem;color:var(--text-muted);margin-top:1px;">Notes: ' + noteNames.join(' ') + '</div>';
    detectEl.innerHTML = html;
  } else {
    detectEl.textContent = noteNames.join(' ');
  }
  // Update instrument diagrams with MIDI-detected chord
  if (candidates.length > 0) {
    const midiPCS = new Set(notes.map(n => n % 12));
    renderGuitarDiagram(candidates[0].rootPC, midiPCS);
    renderPianoDisplay(candidates[0].rootPC, midiPCS);
  }
  highlightMidiPads(notes);
}

function highlightMidiPads(midiNotes) {
  // Remove old highlights
  document.querySelectorAll('.midi-highlight').forEach(el => el.remove());
  const svg = document.getElementById('pad-grid');
  const bm = baseMidi();
  const noteSet = new Set(midiNotes);
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const midi = bm + row * ROW_INTERVAL + col;
      if (!noteSet.has(midi)) continue;
      const x = MARGIN + col * (PAD_SIZE + PAD_GAP);
      const y = MARGIN + (ROWS - 1 - row) * (PAD_SIZE + PAD_GAP);
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      ring.setAttribute('x', x + 2); ring.setAttribute('y', y + 2);
      ring.setAttribute('width', PAD_SIZE - 4); ring.setAttribute('height', PAD_SIZE - 4);
      ring.setAttribute('rx', 6); ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#fff'); ring.setAttribute('stroke-width', 3);
      ring.setAttribute('class', 'midi-highlight');
      ring.setAttribute('pointer-events', 'none');
      svg.appendChild(ring);
    }
  }
}

let selectedMidiInputId = null; // null = all inputs

function initWebMIDI() {
  if (!navigator.requestMIDIAccess) return;
  navigator.requestMIDIAccess().then(access => {
    midiAccess = access;
    const statusEl = document.getElementById('midi-status');
    statusEl.style.display = '';
    const select = document.getElementById('midi-device-select');
    const indicator = document.getElementById('midi-indicator');

    function refreshDeviceList() {
      const prev = select.value;
      select.innerHTML = '<option value="all">All Devices</option>';
      for (const input of access.inputs.values()) {
        const opt = document.createElement('option');
        opt.value = input.id;
        opt.textContent = input.name;
        select.appendChild(opt);
      }
      // Restore previous selection if still available
      if (prev && select.querySelector('option[value="' + prev + '"]')) {
        select.value = prev;
      }
    }

    function connectInputs() {
      // Clear all handlers first
      for (const input of access.inputs.values()) {
        input.onmidimessage = null;
      }
      midiActiveNotes.clear();
      updateMidiDisplay();

      const selectedId = select.value;
      let connected = false;
      let connectedName = '';

      for (const input of access.inputs.values()) {
        if (selectedId !== 'all' && input.id !== selectedId) continue;
        connected = true;
        connectedName = input.name;
        input.onmidimessage = (e) => {
          if (e.data.length < 3) return;
          const [status, note, velocity] = e.data;
          const cmd = status & 0xf0;
          if (cmd === 0x90 && velocity > 0) onMidiNoteOn(note, velocity);
          else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) onMidiNoteOff(note);
        };
      }

      // Push全ポート = シリアル配列(row間8半音) → 4度クロマチック変換が必要
      // Ableton未接続時はLive Portもシリアルで出力される
      if (selectedId !== 'all' && /Push/i.test(connectedName)) {
        midiNoteRemap = 'push-serial';
      } else {
        midiNoteRemap = null;
      }

      indicator.style.background = connected ? '#4caf50' : '#ff9800';
    }

    select.addEventListener('change', () => connectInputs());

    refreshDeviceList();
    connectInputs();
    access.onstatechange = () => {
      refreshDeviceList();
      connectInputs();
    };
  }).catch(() => {});
}

// ========================================
// INITIALIZATION
// ========================================
initKeyButtons();
initScaleSelect();
buildPianoKeyboard('piano-keyboard', selectRoot);
initQualityGrid();
initTensionGrid();
updateOctaveLabel();
initWebMIDI();
render();
</script>
